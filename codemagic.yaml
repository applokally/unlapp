# VERSÃO: v32
# Universidade de Líderes — distribuição App Store e TestFlight

workflows:
  ios-app-store:
    name: Universidade de Líderes — App Store
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic Lokally

    environment:
      flutter: 3.38.7
      xcode: 26.6
      cocoapods: default

      groups:
        - universidade_lideres_testflight

      ios_signing:
        distribution_type: app_store
        bundle_identifier: br.com.universidadedelideres.universidadeLideresApp

    scripts:
      - name: Configurar assinatura iOS para App Store
        script: |
          xcode-project use-profiles

      - name: Instalar dependências Flutter
        script: flutter pub get

      - name: Instalar dependências iOS
        script: |
          find ios -name "Podfile" -execdir pod install \;

      - name: Analisar projeto Flutter
        script: flutter analyze --no-fatal-warnings --no-fatal-infos

      - name: Executar testes Flutter
        script: flutter test

      - name: Gerar IPA para App Store
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - applokally@gmail.com
        notify:
          success: true
          failure: true

      app_store_connect:
        auth: integration
        submit_to_testflight: false
        submit_to_app_store: false